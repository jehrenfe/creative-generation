<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reading — Creative Generation</title>
  <link rel="stylesheet" href="css/style.css"/>
  <style>
    .reader-wrap { max-width: 680px; margin: 0 auto; padding: 48px 24px 80px; }
    .reader-header { margin-bottom: 40px; border-bottom: 1px solid rgba(255,154,92,0.2); padding-bottom: 24px; }
    .reader-title { font-family: var(--font-display); font-size: clamp(28px,5vw,44px); font-weight: 900; line-height: 1.1; margin-bottom: 12px; background: linear-gradient(135deg,var(--red),var(--orange)); -webkit-background-clip:text; -webkit-text-fill-color:transparent; background-clip:text; }
    .reader-author { font-size: 15px; color: var(--light); font-weight: 500; }
    .reader-author span { color: var(--orange); font-weight: 600; }
    .article-body p { font-size: 17px; line-height: 1.85; color: var(--dark); margin-bottom: 1.5em; }
    .article-body h2 { font-family: var(--font-display); font-size: 24px; font-weight: 700; margin: 2em 0 0.5em; color: var(--dark); }
    .article-body p:first-child::first-letter { font-family: var(--font-display); font-size: 4em; font-weight: 900; float: left; line-height: 0.8; margin: 8px 12px 0 0; color: var(--orange); }
    .back-btn { display: inline-flex; align-items: center; gap: 6px; color: var(--orange); font-size: 13px; font-weight: 600; margin-bottom: 32px; cursor: pointer; text-decoration: none; }
    .back-btn:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div id="nav-placeholder"></div>
<div class="reader-wrap">
  <a href="javascript:history.back()" class="back-btn">← Back</a>
  <div class="reader-header">
    <div class="reader-title" id="reader-title">Loading...</div>
    <div class="reader-author" id="reader-author"></div>
  </div>
  <div id="article-container"></div>
</div>
<div id="footer-placeholder"></div>
<script src="js/components.js"></script>
<script src="js/drive.js"></script>
<script>
  const src = new URLSearchParams(window.location.search).get('src');
  if (src) loadArticle({ containerId:'article-container', src });
  else document.getElementById('article-container').innerHTML = '<p style="color:var(--mid)">No article found.</p>';
</script>
</body>
</html>
