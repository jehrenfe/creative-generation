<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Creative Generation — Setting up your account</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    body { font-family: sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: linear-gradient(135deg, #FF6B6B, #FF9A5C, #FFD166); }
    .box { background: white; border-radius: 16px; padding: 40px; text-align: center; max-width: 360px; box-shadow: 0 8px 32px rgba(0,0,0,0.15); }
    h1 { font-size: 22px; margin-bottom: 8px; color: #2C1810; }
    p { color: #7A5840; font-size: 14px; line-height: 1.6; }
  </style>
</head>
<body>
  <div class="box">
    <h1>✦ Creative Generation</h1>
    <p>Setting up your account...<br>A window will appear to complete your login.</p>
  </div>
  <script>
    window.netlifyIdentity.on("init", function(user) {
      if (!user) {
        window.netlifyIdentity.open();
        window.netlifyIdentity.on("login", function() {
          document.location.href = "/admin/";
        });
      } else {
        document.location.href = "/admin/";
      }
    });
  </script>
</body>
</html>
